<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="920" viewBox="0 0 1280 920" role="img" aria-labelledby="title desc">
  <title id="title">AE-Vela Full-Only Daily Work Flow</title>
  <desc id="desc">A demo diagram of the user's Codex daily workflow: object first, Full-only flow, compressed display weight, local completion check, closeout, and curation.</desc>
  <defs>
    <style>
      .bg { fill: #f7f8fb; }
      .title { fill: #18202f; font: 700 30px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .subtitle { fill: #5c6472; font: 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .box { fill: #ffffff; stroke: #cfd6e3; stroke-width: 2; rx: 14; }
      .box-blue { fill: #eaf3ff; stroke: #7aa9df; stroke-width: 2; rx: 14; }
      .box-green { fill: #eaf8f0; stroke: #70b98b; stroke-width: 2; rx: 14; }
      .box-amber { fill: #fff5df; stroke: #dfb45f; stroke-width: 2; rx: 14; }
      .box-red { fill: #fff0f0; stroke: #db8a8a; stroke-width: 2; rx: 14; }
      .text { fill: #202838; font: 600 16px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .small { fill: #4d5665; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .pill { fill: #29364d; }
      .pill-text { fill: #ffffff; font: 700 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .arrow { stroke: #7a8494; stroke-width: 2.4; fill: none; marker-end: url(#arrowhead); }
      .label { fill: #616b7b; font: 13px -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
    </style>
    <marker id="arrowhead" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#7a8494"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1280" height="920"/>
  <text class="title" x="72" y="62">AE-Vela Full-Only Daily Work Flow</text>
  <text class="subtitle" x="72" y="91">默认 Full，不再选模式；只压缩展示强度。Gate/门禁改成咱们电脑上的 Completion Check。</text>

  <rect class="pill" x="72" y="122" width="196" height="30" rx="15"/>
  <text class="pill-text" x="92" y="142">Object first</text>
  <rect class="pill" x="282" y="122" width="172" height="30" rx="15"/>
  <text class="pill-text" x="302" y="142">Full-only</text>
  <rect class="pill" x="468" y="122" width="220" height="30" rx="15"/>
  <text class="pill-text" x="488" y="142">Completion check</text>

  <rect class="box-blue" x="72" y="190" width="220" height="84"/>
  <text class="text" x="96" y="224">1. 任务到来</text>
  <text class="small" x="96" y="249">PRD / 企微 / TAPD / 日报</text>

  <rect class="box-blue" x="392" y="190" width="250" height="84"/>
  <text class="text" x="416" y="224">2. 先判 Object</text>
  <text class="small" x="416" y="249">用对象决定 owner 和证据</text>

  <rect class="box-green" x="742" y="190" width="250" height="84"/>
  <text class="text" x="766" y="224">3. Flow 固定 Full</text>
  <text class="small" x="766" y="249">不再选择 Tiny / Light / Full</text>

  <path class="arrow" d="M292 232 H392"/>
  <path class="arrow" d="M642 232 H742"/>

  <rect class="box" x="392" y="342" width="250" height="84"/>
  <text class="text" x="416" y="374">4. 展示强度</text>
  <text class="small" x="416" y="399">silent / compact / expanded</text>
  <path class="arrow" d="M867 274 C867 316 642 316 566 342"/>

  <rect class="box" x="86" y="510" width="250" height="96"/>
  <text class="text" x="110" y="544">Silent</text>
  <text class="small" x="110" y="570">小问答：流程在心里过</text>
  <text class="small" x="110" y="590">直接给结果</text>

  <rect class="box" x="392" y="510" width="250" height="96"/>
  <text class="text" x="416" y="544">Compact</text>
  <text class="small" x="416" y="570">普通任务：简短说</text>
  <text class="small" x="416" y="590">Object + Check</text>

  <rect class="box-amber" x="698" y="510" width="250" height="96"/>
  <text class="text" x="722" y="544">Expanded</text>
  <text class="small" x="722" y="570">跨系统/外部动作：</text>
  <text class="small" x="722" y="590">显式状态和交接</text>

  <path class="arrow" d="M485 426 C420 462 282 470 214 510"/>
  <path class="arrow" d="M517 426 V510"/>
  <path class="arrow" d="M550 426 C610 462 748 470 816 510"/>

  <rect class="box-amber" x="698" y="668" width="250" height="84"/>
  <text class="text" x="722" y="702">State + Handoff</text>
  <text class="small" x="722" y="727">目标、证据、限制、外部边界</text>
  <path class="arrow" d="M823 606 V668"/>

  <rect class="box-green" x="392" y="668" width="250" height="84"/>
  <text class="text" x="416" y="702">Work</text>
  <text class="small" x="416" y="727">观察、执行、检查结果、调整</text>

  <path class="arrow" d="M211 606 C211 650 392 650 440 668"/>
  <path class="arrow" d="M517 606 V668"/>
  <path class="arrow" d="M698 710 H642"/>

  <rect class="box-red" x="72" y="790" width="250" height="84"/>
  <text class="text" x="96" y="824">Completion Check</text>
  <text class="small" x="96" y="849">本机完成检查，不叫开门禁</text>

  <rect class="box" x="392" y="790" width="250" height="84"/>
  <text class="text" x="416" y="824">Closeout + Ledger</text>
  <text class="small" x="416" y="849">改了什么、验证什么、风险</text>

  <rect class="box-blue" x="712" y="790" width="250" height="84"/>
  <text class="text" x="736" y="824">Curate?</text>
  <text class="small" x="736" y="849">有复用经验才写回 skill/workflow</text>

  <path class="arrow" d="M392 710 C330 710 236 754 197 790"/>
  <path class="arrow" d="M322 832 H392"/>
  <path class="arrow" d="M642 832 H712"/>

  <rect class="box-red" x="1010" y="668" width="210" height="84"/>
  <text class="text" x="1034" y="702">外部可见动作</text>
  <text class="small" x="1034" y="727">先预览，等你确认</text>
  <path class="arrow" d="M322 812 C590 746 820 710 1010 710"/>
  <text class="label" x="878" y="693">submit / send / publish / push</text>
</svg>
